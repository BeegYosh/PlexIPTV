version: "3.9"

services:
  plexiptv:
    build: .
    container_name: plexiptv
    restart: unless-stopped
    network_mode: host
    environment:
      XTREAM_SERVER: "http://YOUR_SERVER:8080"
      XTREAM_USERNAME: "YOUR_USERNAME"
      XTREAM_PASSWORD: "YOUR_PASSWORD"
      TUNER_COUNT: "4"
      TUNER_NAME: "PRIME"
      SERVER_PORT: "5004"
      BUFFER_SIZE_KB: "512"
      CHANNEL_REFRESH_MIN: "120"
      EPG_REFRESH_MIN: "60"
      CATEGORY_FILTER: "PPV,UFC,SPORTS,DUAL-AUDIO"
    volumes:
      - plexiptv-data:/app/data

volumes:
  plexiptv-data: {}
