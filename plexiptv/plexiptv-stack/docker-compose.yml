version: "3.9"

services:
  plexiptv:
    image: plexiptv:latest
    container_name: plexiptv
    restart: unless-stopped
    network_mode: host
    environment:
      XTREAM_SERVER: "http://YOUR_SERVER:8080"
      XTREAM_USERNAME: "YOUR_USERNAME"
      XTREAM_PASSWORD: "YOUR_PASSWORD"
      TUNER_COUNT: "4"
      TUNER_NAME: "PRIME"
      SERVER_PORT: "5004"
      BUFFER_SIZE_KB: "512"
      CHANNEL_REFRESH_MIN: "120"
      EPG_REFRESH_MIN: "60"
      PLEXIPTV_CONFIG: "/data/config.yaml"
      PLEXIPTV_DB: "/data/plexiptv.db"
    volumes:
      - plexiptv-data:/data

volumes:
  plexiptv-data: {}
