version: "3.8"

services:
  plexiptv:
    build: .
    container_name: plexiptv
    restart: unless-stopped
    network_mode: host      # Required for SSDP/UPnP so Plex auto-discovers the tuner
    environment:
      # --- Xtream Codes credentials ---
      XTREAM_SERVER: "http://YOUR_SERVER:8080"
      XTREAM_USERNAME: "YOUR_USERNAME"
      XTREAM_PASSWORD: "YOUR_PASSWORD"

      # --- Tuner settings ---
      TUNER_COUNT: "4"                 # Max simultaneous streams Plex can open
      TUNER_NAME: "PRIME"              # Shows up in Plex as the tuner name

      # --- Server ---
      SERVER_PORT: "5004"              # Port the app listens on

      # --- Proxy ---
      BUFFER_SIZE_KB: "512"            # Pre-buffer size before sending first byte

      # --- Cache ---
      CHANNEL_REFRESH_MIN: "120"       # Re-fetch channel list every N minutes
      EPG_REFRESH_MIN: "60"            # Re-fetch EPG every N minutes

      # --- Internal paths (usually no need to change) ---
      PLEXIPTV_CONFIG: "/data/config.yaml"
      PLEXIPTV_DB: "/data/plexiptv.db"

    volumes:
      - plexiptv-data:/data            # Persist config + database across restarts

volumes:
  plexiptv-data:
    driver: local
